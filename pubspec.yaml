name: inlet
description: inlet app using Flutter
publish_to: 'none'

environment:
  sdk: '>=2.18.0 <4.0.0'

dependencies:
  supabase_flutter: ^2.10.3
  flutter:
    sdk: flutter
  provider: ^6.0.5
  intl: ^0.20.2
  image_picker: ^1.2.0
  image: ^4.1.3
  uuid: ^4.5.2
  lottie: ^3.1.2
  firebase_core: ^4.2.1
  firebase_messaging: ^16.0.4
  http: ^1.2.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon_app.png"

flutter:
  uses-material-design: true

  assets:
    - assets/lottie/
    - assets/icon/